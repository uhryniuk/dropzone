version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dropzone
    binary: dropzone
    main: ./cmd/dropzone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: dropzone
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Documentation
      regexp: '^docs(\(.+\))?!?:'
      order: 2
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - Merge pull request
      - Merge branch
